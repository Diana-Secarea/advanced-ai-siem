<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threat Intel Chat - Wazuh AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1419;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #58a6ff;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-actions a {
      color: #8b949e;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .header-actions a:hover {
      background: #21262d;
      color: #c9d1d9;
    }

    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: #30363d;
      border-color: #58a6ff;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #388bfd;
      color: #fff;
    }

    .message.assistant .avatar {
      background: #238636;
      color: #fff;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #388bfd;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #161b22;
      border: 1px solid #30363d;
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }

    .bubble pre {
      background: #0d1117;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid #30363d;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    .bubble strong { color: #58a6ff; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 4px 0; }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .source-tag {
      background: #21262d;
      color: #8b949e;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .source-tag.mitre { color: #f85149; background: #f8514920; }
    .source-tag.yara { color: #a371f7; background: #a371f720; }
    .source-tag.vendor { color: #d29922; background: #d2992220; }
    .source-tag.wazuh { color: #3fb950; background: #3fb95020; }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      margin-left: 44px;
    }

    .typing-indicator.visible { display: flex; gap: 4px; }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #6e7681;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px 0;
      border-top: 1px solid #30363d;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #chatInput {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
    }

    #chatInput:focus { border-color: #58a6ff; }

    #chatInput::placeholder { color: #6e7681; }

    #sendBtn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #2ea043; }
    #sendBtn:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: #6e7681;
    }

    .welcome h2 {
      color: #c9d1d9;
      font-size: 22px;
      margin-bottom: 12px;
    }

    .welcome p { margin-bottom: 20px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.2s, color 0.2s;
    }

    .suggestion:hover {
      border-color: #58a6ff;
      color: #c9d1d9;
    }

    @media (max-width: 768px) {
      .chat-container { padding: 0 12px; }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Threat Intel Chat</h1>
    <div class="header-actions">
      <a href="/">Alerts Dashboard</a>
      <button class="btn" id="newChatBtn">New Chat</button>
    </div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Wazuh AI Threat Intel Chat</h2>
        <p>Ask questions about MITRE ATT&CK techniques, YARA rules, and security advisories.</p>
        <div class="suggestions">
          <div class="suggestion" onclick="askSuggestion(this)">What attacks were detected on my system?</div>
          <div class="suggestion" onclick="askSuggestion(this)">Show me SSH brute force attempts</div>
          <div class="suggestion" onclick="askSuggestion(this)">Explain T1055 process injection</div>
          <div class="suggestion" onclick="askSuggestion(this)">What rootkit alerts were triggered?</div>
        </div>
      </div>
    </div>

    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="chatInput" rows="1" placeholder="Ask about threats, techniques, or detection rules..." autofocus></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const typingEl = document.getElementById("typing");
    const welcomeEl = document.getElementById("welcome");
    const newChatBtn = document.getElementById("newChatBtn");

    const API_BASE = location.protocol === "file:"
      ? "http://127.0.0.1:5000"
      : location.origin;

    let sessionId = null;

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    newChatBtn.addEventListener("click", () => {
      if (sessionId) {
        fetch(`${API_BASE}/api/chat/sessions?session_id=${sessionId}`, { method: "DELETE" });
      }
      sessionId = null;
      messagesEl.innerHTML = "";
      messagesEl.appendChild(welcomeEl);
      welcomeEl.style.display = "block";
      inputEl.focus();
    });

    function askSuggestion(el) {
      inputEl.value = el.textContent;
      sendMessage();
    }

    function renderMarkdown(text) {
      // Code blocks
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
      });
      // Inline code
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      // Italic
      text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
      // Unordered lists
      text = text.replace(/^- (.+)$/gm, "<li>$1</li>");
      text = text.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`);
      // Ordered lists
      text = text.replace(/^\d+\.\s(.+)$/gm, "<li>$1</li>");
      // Newlines to <br> (but not inside pre/ul)
      text = text.replace(/\n/g, "<br>");
      // Clean up extra <br> inside tags
      text = text.replace(/<br><\/ul>/g, "</ul>");
      text = text.replace(/<ul><br>/g, "<ul>");
      text = text.replace(/<br><li>/g, "<li>");
      text = text.replace(/<\/li><br>/g, "</li>");
      return text;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(role, content, sources) {
      welcomeEl.style.display = "none";

      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "U" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (role === "assistant") {
        bubble.innerHTML = renderMarkdown(content);
      } else {
        bubble.textContent = content;
      }

      msgDiv.appendChild(avatar);

      // Build content column: bubble + optional source tags
      const contentCol = document.createElement("div");
      contentCol.style.display = "flex";
      contentCol.style.flexDirection = "column";
      contentCol.style.gap = "6px";
      contentCol.style.minWidth = "0";
      contentCol.appendChild(bubble);

      if (role === "assistant" && sources && sources.length > 0) {
        const sourcesDiv = document.createElement("div");
        sourcesDiv.className = "sources";
        // Deduplicate sources by id+type
        const seen = new Set();
        sources.forEach(s => {
          const key = s.type + ":" + s.id;
          if (seen.has(key)) return;
          seen.add(key);
          const tag = document.createElement("span");
          let tagClass = "source-tag";
          if (s.type === "mitre_attack") tagClass += " mitre";
          else if (s.type === "yara_rule") tagClass += " yara";
          else if (s.type === "vendor_advisory") tagClass += " vendor";
          else if (s.type === "wazuh_alert") tagClass += " wazuh";
          tag.className = tagClass;
          tag.textContent = s.id;
          tag.title = s.summary;
          sourcesDiv.appendChild(tag);
        });
        contentCol.appendChild(sourcesDiv);
      }

      msgDiv.appendChild(contentCol);
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Check URL for initial query from alerts dashboard
    (function checkInitialQuery() {
      const params = new URLSearchParams(location.search);
      const q = params.get("q");
      if (q) {
        // Clear the param from URL so refresh doesn't re-send
        history.replaceState(null, "", location.pathname);
        inputEl.value = q;
        setTimeout(() => sendMessage(), 300);
      }
    })();

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      addMessage("user", text);

      // Show typing indicator
      typingEl.classList.add("visible");
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const resp = await fetch(`${API_BASE}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });

        const data = await resp.json();

        if (data.error) {
          addMessage("assistant", `Error: ${data.error}`, []);
        } else {
          sessionId = data.session_id;
          addMessage("assistant", data.reply, data.sources || []);
        }
      } catch (err) {
        addMessage("assistant", `Connection error: ${err.message}. Is the server running?`, []);
      } finally {
        typingEl.classList.remove("visible");
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
